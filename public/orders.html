<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html { scroll-behavior: smooth; }
    body { animation: page-fade 420ms ease-out both; }
    a, button, input, select, textarea {
      transition: color 0.2s ease, background-color 0.2s ease, border-color 0.2s ease, opacity 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
    }
    @keyframes page-fade {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      body { animation: none; }
    }
  </style>
</head>

<body class="bg-gray-50 font-outfit min-h-screen">

  <!-- Header -->
  <header class="bg-white shadow-md py-6">
    <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
      <h1 class="text-3xl font-bold text-gray-900">My Orders</h1>
      <button onclick="window.location.href='index.html'"
        class="px-4 py-2 bg-black text-white rounded-lg hover:opacity-80 transition">
        Back to Shop
      </button>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-7xl mx-auto px-6 py-12">
    <div id="ordersContainer" class="space-y-8">
      <!-- Orders will be rendered here -->
    </div>
  </main>

  <script>
    const API_BASE_URL = window.API_BASE_URL || (window.location.port === "5000" ? "" : "http://localhost:5000");

    function resolveImageUrl(imagePath) {
      if (!imagePath) return "https://via.placeholder.com/150?text=No+Image";
      const normalizedValue = String(imagePath).trim().replace(/\\/g, "/");
      if (/^https?:\/\//i.test(normalizedValue) || normalizedValue.startsWith("data:")) return normalizedValue;
      const cleanedPath = normalizedValue.replace(/^\.?\//, "");
      const normalizedPath = `/${cleanedPath}`;
      const baseUrl = String(API_BASE_URL || "").replace(/\/$/, "");
      return `${baseUrl}${normalizedPath}`;
    }

    const STATUS_META = {
      pending: { label: "Order Placed", badge: "bg-yellow-100 text-yellow-800" },
      shipped: { label: "Shipped", badge: "bg-blue-100 text-blue-800" },
      delivered: { label: "Delivered", badge: "bg-green-100 text-green-800" },
      cancelled: { label: "Cancelled", badge: "bg-red-100 text-red-800" },
      "return-requested": { label: "Return Requested", badge: "bg-orange-100 text-orange-800" },
      returned: { label: "Returned", badge: "bg-slate-200 text-slate-800" },
      refunded: { label: "Refunded", badge: "bg-emerald-100 text-emerald-800" },
    };

    const PROGRESS_TRACK = ["pending", "shipped", "delivered"];

    async function loadOrders() {
      const token = localStorage.getItem("token");
      if (!token) {
        alert("Please login first");
        window.location.href = "login.html";
        return;
      }

      try {
        const res = await fetch("http://localhost:5000/api/orders/my-orders", {
          headers: { Authorization: `Bearer ${token}` }
        });

        const contentType = res.headers.get("content-type");
        if (!contentType || !contentType.includes("application/json")) {
          console.error("Not JSON!", await res.text());
          document.getElementById("ordersContainer").innerHTML =
            '<p class="text-center text-gray-500">Failed to load orders.</p>';
          return;
        }

        const orders = await res.json();
        renderOrders(orders);
      } catch (err) {
        console.error(err);
        document.getElementById("ordersContainer").innerHTML =
          '<p class="text-center text-gray-500">Failed to load orders.</p>';
      }
    }

    function formatStatus(status) {
      return STATUS_META[status] || { label: status, badge: "bg-gray-100 text-gray-700" };
    }

    function formatDateTime(value) {
      if (!value) return "Pending";
      return new Date(value).toLocaleString();
    }

    function buildTimeline(order) {
      const fromApi = Array.isArray(order.statusTimeline)
        ? order.statusTimeline.map((event) => ({
            status: event.status,
            note: event.note,
            timestamp: event.timestamp,
          }))
        : [];

      if (fromApi.length > 0) {
        return fromApi.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
      }

      const fallback = [
        { status: "pending", note: "Order placed", timestamp: order.createdAt },
      ];

      if (order.shippedAt) fallback.push({ status: "shipped", note: "Order shipped", timestamp: order.shippedAt });
      if (order.deliveredAt) fallback.push({ status: "delivered", note: "Order delivered", timestamp: order.deliveredAt });
      if (order.cancelledAt) fallback.push({ status: "cancelled", note: "Order cancelled", timestamp: order.cancelledAt });
      if (order.returnedAt) fallback.push({ status: "returned", note: "Order returned", timestamp: order.returnedAt });
      if (order.refundedAt) fallback.push({ status: "refunded", note: "Refund completed", timestamp: order.refundedAt });

      return fallback;
    }

    function renderProgress(order) {
      const currentIndex = PROGRESS_TRACK.indexOf(order.status);
      const isCancelled = order.status === "cancelled";

      return `
        <div class="bg-gray-50 border rounded-lg p-4 mb-6">
          <p class="text-sm font-semibold text-gray-700 mb-4">Tracking Timeline</p>
          <div class="grid grid-cols-3 gap-3">
            ${PROGRESS_TRACK.map((step, index) => {
              const active = !isCancelled && (currentIndex >= index || (currentIndex === -1 && step === "pending"));
              const complete = !isCancelled && currentIndex > index;
              const stepMeta = formatStatus(step);

              return `
                <div class="text-center">
                  <div class="mx-auto mb-2 w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold ${active ? "bg-black text-white" : "bg-gray-200 text-gray-500"}">
                    ${complete ? "OK" : index + 1}
                  </div>
                  <p class="text-xs ${active ? "text-gray-900 font-semibold" : "text-gray-500"}">${stepMeta.label}</p>
                </div>
              `;
            }).join("")}
          </div>
          ${isCancelled ? '<p class="text-sm text-red-600 mt-4 font-medium">This order was cancelled.</p>' : ""}
        </div>
      `;
    }

    function renderOrders(orders) {
      const container = document.getElementById("ordersContainer");

      if (!orders || orders.length === 0) {
        container.innerHTML = '<p class="text-center text-gray-500">You have no past orders.</p>';
        return;
      }

      container.innerHTML = orders.map((order) => {
        const statusMeta = formatStatus(order.status);
        const timeline = buildTimeline(order);

        return `
          <div class="bg-white rounded-lg shadow p-6">
            <div class="flex flex-col md:flex-row md:justify-between md:items-center gap-3 mb-4">
              <div>
                <p class="text-gray-700 font-medium">Order</p>
                <p class="text-gray-500 text-sm">Placed on ${new Date(order.createdAt).toLocaleDateString()}</p>
              </div>
              <span class="inline-flex px-3 py-1 rounded-full text-xs font-semibold ${statusMeta.badge}">${statusMeta.label}</span>
            </div>

            ${renderProgress(order)}

            <div class="mb-6">
              <p class="text-sm font-semibold text-gray-700 mb-3">Status History</p>
              <div class="space-y-3">
                ${timeline.map((event, index) => {
                  const eventMeta = formatStatus(event.status);
                  const isLast = index === timeline.length - 1;
                  return `
                    <div class="flex gap-3">
                      <div class="flex flex-col items-center">
                        <span class="w-3 h-3 rounded-full bg-black mt-1"></span>
                        ${isLast ? "" : '<span class="w-px h-8 bg-gray-300 mt-1"></span>'}
                      </div>
                      <div>
                        <p class="text-sm font-semibold text-gray-900">${eventMeta.label}</p>
                        <p class="text-xs text-gray-600">${event.note || "Status updated"} - ${formatDateTime(event.timestamp)}</p>
                      </div>
                    </div>
                  `;
                }).join("")}
              </div>
            </div>

            <div class="space-y-4">
              ${order.items.map((item) => {
                const product = item.product;
                const name = product ? product.name : "Deleted Product";
                const image = resolveImageUrl(product?.image);
                const price = product ? product.price : 0;
                const total = (price * item.quantity).toFixed(2);

                return `
                  <div class="flex items-center justify-between border-b pb-4">
                    <div class="flex items-center gap-4">
                      <div class="w-16 h-16 bg-gray-200 rounded-lg overflow-hidden flex items-center justify-center">
                        <img src="${image}" alt="${name}" class="w-full h-full object-cover" onerror="this.onerror=null;this.src='https://via.placeholder.com/150?text=No+Image';">
                      </div>
                      <div>
                        <h3 class="font-medium text-gray-900">${name}</h3>
                        <p class="text-gray-500 text-sm">Qty: ${item.quantity}</p>
                      </div>
                    </div>
                    <p class="font-medium text-gray-900">$${total}</p>
                  </div>
                `;
              }).join("")}
            </div>

            <p class="mt-4 text-right text-gray-900 font-bold">
              Total: $${order.items.reduce((sum, i) => sum + ((i.product ? i.product.price : 0) * i.quantity), 0).toFixed(2)}
            </p>
          </div>
        `;
      }).join("");
    }

    loadOrders();
  </script>

</body>

</html>
