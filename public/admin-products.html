<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Products</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html { scroll-behavior: smooth; }
    body { animation: page-fade 420ms ease-out both; }
    a, button, input, select, textarea {
      transition: color 0.2s ease, background-color 0.2s ease, border-color 0.2s ease, opacity 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
    }
    @keyframes page-fade {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      body { animation: none; }
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <header class="bg-white shadow-md py-6">
    <div class="max-w-5xl mx-auto px-6 flex items-center justify-between gap-4">
      <div>
        <h1 class="text-3xl font-bold text-gray-900">Admin Product Management</h1>
        <p class="text-sm text-gray-500 mt-1">Add products securely for your store catalog.</p>
      </div>
      <div class="flex gap-2">
        <button onclick="window.location.href='admin-dashboard.html'" class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-100 transition">
          Dashboard
        </button>
        <button onclick="window.location.href='admin-orders.html'" class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-100 transition">
          Admin Orders
        </button>
        <button onclick="window.location.href='index.html'" class="px-4 py-2 bg-black text-white rounded-lg hover:opacity-85 transition">
          Back to Shop
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-6 py-10">
    <div id="adminNotice" class="hidden mb-6 rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-red-700 text-sm"></div>

    <section class="bg-white rounded-xl shadow p-6">
      <h2 class="text-xl font-semibold text-gray-900 mb-4">Add New Product</h2>
      <form id="addProductForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="text-sm text-gray-700 block mb-1">Name *</label>
          <input id="name" type="text" required class="w-full border rounded-lg px-3 py-2 text-sm outline-none focus:border-black">
        </div>
        <div>
          <label class="text-sm text-gray-700 block mb-1">Category *</label>
          <input id="category" type="text" required class="w-full border rounded-lg px-3 py-2 text-sm outline-none focus:border-black">
        </div>
        <div class="md:col-span-2">
          <label class="text-sm text-gray-700 block mb-1">Description *</label>
          <textarea id="description" rows="4" required class="w-full border rounded-lg px-3 py-2 text-sm outline-none focus:border-black"></textarea>
        </div>
        <div>
          <label class="text-sm text-gray-700 block mb-1">Features</label>
          <input id="features" type="text" placeholder="e.g. Waterproof, USB-C" class="w-full border rounded-lg px-3 py-2 text-sm outline-none focus:border-black">
        </div>
        <div>
          <label class="text-sm text-gray-700 block mb-1">Image URL</label>
          <input id="image" type="url" placeholder="https://..." class="w-full border rounded-lg px-3 py-2 text-sm outline-none focus:border-black">
        </div>
        <div>
          <label class="text-sm text-gray-700 block mb-1">Price *</label>
          <input id="price" type="number" step="0.01" min="0" required class="w-full border rounded-lg px-3 py-2 text-sm outline-none focus:border-black">
        </div>
        <div>
          <label class="text-sm text-gray-700 block mb-1">Stock</label>
          <input id="stock" type="number" min="0" value="0" class="w-full border rounded-lg px-3 py-2 text-sm outline-none focus:border-black">
        </div>
        <div class="md:col-span-2 flex items-center gap-3">
          <button type="submit" class="px-5 py-2.5 bg-black text-white rounded-lg hover:opacity-90 transition text-sm">
            Create Product
          </button>
          <p id="formMessage" class="text-sm text-gray-500"></p>
        </div>
      </form>
    </section>
  </main>

  <script>
    const apiBaseUrl = window.API_BASE_URL || (window.location.port === "5000" ? "" : "http://localhost:5000");

    function showAdminNotice(message) {
      const notice = document.getElementById("adminNotice");
      notice.textContent = message;
      notice.classList.remove("hidden");
    }

    async function fetchProfile(token) {
      const res = await fetch(`${apiBaseUrl}/api/user/profile`, {
        headers: { Authorization: `Bearer ${token}` }
      });
      if (!res.ok) return null;
      const data = await res.json();
      return data?.user || null;
    }

    async function verifyAdminAccess() {
      const token = localStorage.getItem("token");
      if (!token) {
        showAdminNotice("Please login first.");
        setTimeout(() => { window.location.href = "login.html"; }, 1000);
        return null;
      }

      const user = await fetchProfile(token);
      if (!user || user.role !== "admin") {
        showAdminNotice("Admin access required. You are not allowed to view this page.");
        setTimeout(() => { window.location.href = "index.html"; }, 1200);
        return null;
      }

      return token;
    }

    async function createProduct(event) {
      event.preventDefault();
      const messageEl = document.getElementById("formMessage");
      const token = await verifyAdminAccess();
      if (!token) return;

      const payload = {
        name: document.getElementById("name").value.trim(),
        category: document.getElementById("category").value.trim(),
        description: document.getElementById("description").value.trim(),
        features: document.getElementById("features").value.trim(),
        image: document.getElementById("image").value.trim(),
        price: Number(document.getElementById("price").value),
        stock: Number(document.getElementById("stock").value || 0),
      };

      try {
        messageEl.textContent = "Creating product...";
        messageEl.className = "text-sm text-gray-500";

        const res = await fetch(`${apiBaseUrl}/api/products`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${token}`
          },
          body: JSON.stringify(payload)
        });

        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.message || "Failed to create product");
        }

        document.getElementById("addProductForm").reset();
        document.getElementById("stock").value = "0";
        messageEl.textContent = "Product created successfully.";
        messageEl.className = "text-sm text-green-600";
      } catch (err) {
        messageEl.textContent = err.message || "Failed to create product";
        messageEl.className = "text-sm text-red-600";
      }
    }

    async function initPage() {
      const token = await verifyAdminAccess();
      if (!token) return;
      document.getElementById("addProductForm").addEventListener("submit", createProduct);
    }

    initPage();
  </script>
</body>
</html>
