<!DOCTYPE html>
<html>

<head>
  <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    html { scroll-behavior: smooth; }
    body {
      font-family: "Outfit", sans-serif;
      background-color: #fafaf9;
      animation: page-fade 420ms ease-out both;
    }
    a, button, input, select, textarea {
      transition: color 0.2s ease, background-color 0.2s ease, border-color 0.2s ease, opacity 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
    }
    @keyframes page-fade {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      body { animation: none; }
    }
  </style>
</head>

<body class="flex items-center justify-center min-h-screen">
<div class="bg-white rounded-xl shadow-lg w-full max-w-md p-8">
 <h1 class="text-2xl font-semibold text-gray-900 mb-6 text-center">Login</h1>
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
    <input type="email" name="email" id="email"
      class="w-full px-4 py-3 border rounded-lg text-gray-900 focus:outline-none focus:ring-2 focus:ring-black">
  </div>
  <br>
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
    <input type="password" name="password" id="password"
      class="w-full px-4 py-3 border rounded-lg text-gray-900 focus:outline-none focus:ring-2 focus:ring-black">
  </div>
  <br>
  <button id="loginBtn"
        class="w-full py-3 bg-black text-white rounded-lg font-medium hover:opacity-80 transition">Login</button>

  <p class="mt-4 text-sm text-center text-gray-600">
    If you don't have an account? <a href="register.html" class="text-black font-medium hover:underline">Register</a>
  </p>
  <p id="msg"></p>
  </div>

  <script src="login.js"></script>


</body>

</html>
