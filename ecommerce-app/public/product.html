
<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Detail</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#f7f8f6;--surface:#fff;--line:#d8ddd7;--text:#111313;--muted:#5f6661;--accent:#0f766e;--accent-strong:#0b5d57}
    *{box-sizing:border-box;font-family:'Manrope',sans-serif}h1,h2,h3,h4,h5{font-family:'Sora',sans-serif}
    body{min-height:100vh;color:var(--text);background:radial-gradient(circle at 18% 8%,rgba(15,118,110,.1),transparent 24%),radial-gradient(circle at 80% 85%,rgba(20,20,20,.05),transparent 32%),var(--bg);animation:page-fade .42s ease-out both}
    html{scroll-behavior:smooth}
    a,button,input,select,textarea{transition:color .2s ease,background-color .2s ease,border-color .2s ease,opacity .2s ease,transform .2s ease,box-shadow .2s ease}
    .nav-shell{background:rgba(247,248,246,.9);border-bottom:1px solid var(--line);backdrop-filter:blur(10px)}
    .shell{background:var(--surface);border:1px solid var(--line);border-radius:1rem;box-shadow:0 16px 32px rgba(20,20,20,.08)}
    .media{background:linear-gradient(140deg,#fff,#eef1ec)}
    .btn{background:var(--accent);color:#fff;border-radius:999px;padding:.8rem 1.4rem;font-weight:600;transition:.25s}
    .btn:hover{background:var(--accent-strong)}
    @keyframes page-fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    @media (prefers-reduced-motion:reduce){html{scroll-behavior:auto}body{animation:none}}
  </style>
</head>
<body>
  <nav class="sticky top-0 z-50 nav-shell">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <h1 class="text-xl font-semibold tracking-tight">ASCAPDX</h1>
      <div class="hidden md:flex items-center gap-8 text-sm"><a href="index.html#products">Shop</a><a href="about.html">About</a><a href="contact.html">Contact</a><a href="login.html">Login</a></div>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto py-12 px-6">
    <button onclick="window.history.back()" class="mb-6 text-sm text-[#5f6661] hover:text-black">&larr; Back</button>
    <div id="product-detail" class="shell p-6 md:p-8 grid grid-cols-1 md:grid-cols-2 gap-8"></div>
  </main>

  <script>
    const API_BASE_URL=window.location.port==='5000'?'':'http://localhost:5000'
    function resolveImageUrl(imagePath){if(!imagePath){return 'https://via.placeholder.com/800x800?text=No+Image'}const normalizedValue=String(imagePath).trim().replace(/\\/g,'/');if(/^https?:\/\//i.test(normalizedValue)||normalizedValue.startsWith('data:')){return normalizedValue}const cleanedPath=normalizedValue.replace(/^\.?\//,'');const normalizedPath=`/${cleanedPath}`;const baseUrl=String(API_BASE_URL||'').replace(/\/$/,'');return `${baseUrl}${normalizedPath}`}

    async function loadProduct(){
      const productId=localStorage.getItem('productId')
      if(!productId){alert('No product selected!');window.location.href='index.html';return}
      try{
        const res=await fetch(`${API_BASE_URL}/api/products/${productId}`)
        if(!res.ok){throw new Error(`Failed to load product: ${res.status}`)}
        const product=await res.json()
        const imageUrl=resolveImageUrl(product.image)
        const priceNum=Number(product.price)
        const priceLabel=Number.isFinite(priceNum)?`$${priceNum.toFixed(2)}`:'Price N/A'
        const stockNum=Number(product.stock ?? 0)
        const stockLabel=stockNum>0?`${stockNum} in stock`:'Out of stock'
        const stockClass=stockNum>0?'text-[#0f766e]':'text-[#b42318]'
        document.getElementById('product-detail').innerHTML=`
          <div class="media rounded-xl overflow-hidden border border-[#d8ddd7] h-80 md:h-[32rem]"><img src="${imageUrl}" alt="${product.name||'Product'}" class="w-full h-full object-cover" onerror="this.onerror=null;this.src='https://via.placeholder.com/800x800?text=No+Image';"/></div>
          <div class="flex flex-col justify-center">
            <p class="text-xs uppercase tracking-[0.2em] text-[#6f7770] mb-2">${product.category||'Product'}</p>
            <h1 class="text-3xl md:text-4xl font-semibold tracking-tight mb-4">${product.name||'Untitled product'}</h1>
            <p class="text-2xl font-semibold mb-5">${priceLabel}</p>
            <div class="flex flex-wrap items-center gap-2 mb-5">
              <span class="text-xs px-3 py-1 rounded-full border border-[#d8ddd7] bg-[#f7f9f6] text-[#5f6661]">${product.category||'General'}</span>
              <span class="text-xs px-3 py-1 rounded-full border border-[#d8ddd7] bg-[#f7f9f6] ${stockClass}">${stockLabel}</span>
            </div>
            <div class="mb-5">
              <h3 class="text-sm font-semibold uppercase tracking-[0.14em] text-[#6f7770] mb-2">Features</h3>
              <p class="text-[#5f6661]">${product.features||'No additional features listed.'}</p>
            </div>
            <div class="mb-7">
              <h3 class="text-sm font-semibold uppercase tracking-[0.14em] text-[#6f7770] mb-2">Description</h3>
              <p class="text-[#414641] leading-relaxed">${product.description||'No description available.'}</p>
            </div>
            <div class="flex items-center gap-3"><button onclick="addToCart('${product._id}')" class="btn">Add to Cart</button><a href="index.html#products" class="text-sm text-[#5f6661] hover:text-black">Continue shopping</a></div>
          </div>`
      }catch(err){console.error(err);alert('Failed to load product!')}
    }

    async function addToCart(productId){
      const token=localStorage.getItem('token')
      if(!token){alert('Please login first');window.location.href='login.html';return}
      await fetch(`${API_BASE_URL}/api/cart/add`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({productId,quantity:1})})
      alert('Added to cart')
    }
    loadProduct()
  </script>
</body>
</html>
