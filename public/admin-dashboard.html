<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html { scroll-behavior: smooth; }
    body { animation: page-fade 420ms ease-out both; }
    a, button, input, select, textarea {
      transition: color 0.2s ease, background-color 0.2s ease, border-color 0.2s ease, opacity 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
    }
    @keyframes page-fade {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      body { animation: none; }
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <header class="bg-white shadow-md py-6">
    <div class="max-w-7xl mx-auto px-6 flex items-center justify-between gap-4">
      <div>
        <h1 class="text-3xl font-bold text-gray-900">Admin Dashboard</h1>
        <p class="text-sm text-gray-500 mt-1">Traffic and sales overview.</p>
      </div>
      <div class="flex flex-wrap gap-2">
        <button onclick="window.location.href='admin-orders.html'" class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-100 transition">
          Admin Orders
        </button>
        <button onclick="window.location.href='admin-products.html'" class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-100 transition">
          Admin Products
        </button>
        <button onclick="window.location.href='index.html'" class="px-4 py-2 bg-black text-white rounded-lg hover:opacity-85 transition">
          Back to Shop
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-6 py-10">
    <div id="adminNotice" class="hidden mb-6 rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-red-700 text-sm"></div>

    <section class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
      <article class="bg-white rounded-xl shadow p-5">
        <p class="text-xs uppercase tracking-wide text-gray-500">Total Visits</p>
        <p id="totalVisits" class="text-2xl font-bold text-gray-900 mt-2">-</p>
      </article>
      <article class="bg-white rounded-xl shadow p-5">
        <p class="text-xs uppercase tracking-wide text-gray-500">Unique Visitors</p>
        <p id="uniqueVisitors" class="text-2xl font-bold text-gray-900 mt-2">-</p>
      </article>
      <article class="bg-white rounded-xl shadow p-5">
        <p class="text-xs uppercase tracking-wide text-gray-500">Registered Users</p>
        <p id="totalUsers" class="text-2xl font-bold text-gray-900 mt-2">-</p>
      </article>
      <article class="bg-white rounded-xl shadow p-5">
        <p class="text-xs uppercase tracking-wide text-gray-500">Total Orders</p>
        <p id="totalOrders" class="text-2xl font-bold text-gray-900 mt-2">-</p>
      </article>
    </section>

    <section class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
      <article class="bg-white rounded-xl shadow p-5">
        <p class="text-xs uppercase tracking-wide text-gray-500">Gross Sales</p>
        <p id="grossSales" class="text-2xl font-bold text-gray-900 mt-2">$0.00</p>
      </article>
      <article class="bg-white rounded-xl shadow p-5">
        <p class="text-xs uppercase tracking-wide text-gray-500">Net Sales</p>
        <p id="netSales" class="text-2xl font-bold text-gray-900 mt-2">$0.00</p>
      </article>
      <article class="bg-white rounded-xl shadow p-5">
        <p class="text-xs uppercase tracking-wide text-gray-500">Delivered Sales</p>
        <p id="deliveredSales" class="text-2xl font-bold text-gray-900 mt-2">$0.00</p>
      </article>
    </section>

    <section class="bg-white rounded-xl shadow p-6">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-semibold text-gray-900">Last 7 Days</h2>
        <button onclick="loadDashboard()" class="text-sm px-3 py-1.5 border rounded-lg hover:bg-gray-100">Refresh</button>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="text-left text-gray-500 border-b">
              <th class="py-2 pr-3">Date</th>
              <th class="py-2 pr-3">Visits</th>
              <th class="py-2 pr-3">Sales</th>
            </tr>
          </thead>
          <tbody id="trendTable"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    const apiBaseUrl = window.API_BASE_URL || (window.location.port === "5000" ? "" : "http://localhost:5000");

    function showAdminNotice(message) {
      const notice = document.getElementById("adminNotice");
      notice.textContent = message;
      notice.classList.remove("hidden");
    }

    function formatMoney(value) {
      const amount = Number(value || 0);
      return `$${amount.toFixed(2)}`;
    }

    function formatNumber(value) {
      return Number(value || 0).toLocaleString();
    }

    async function fetchProfile(token) {
      const res = await fetch(`${apiBaseUrl}/api/user/profile`, {
        headers: { Authorization: `Bearer ${token}` }
      });
      if (!res.ok) return null;
      const data = await res.json();
      return data?.user || null;
    }

    async function verifyAdminAccess() {
      const token = localStorage.getItem("token");
      if (!token) {
        showAdminNotice("Please login first.");
        setTimeout(() => { window.location.href = "login.html"; }, 1000);
        return null;
      }

      const user = await fetchProfile(token);
      if (!user || user.role !== "admin") {
        showAdminNotice("Admin access required. You are not allowed to view this page.");
        setTimeout(() => { window.location.href = "index.html"; }, 1200);
        return null;
      }

      return token;
    }

    function renderDashboard(data) {
      const totals = data?.totals || {};
      const trend = Array.isArray(data?.trend) ? data.trend : [];

      document.getElementById("totalVisits").textContent = formatNumber(totals.totalVisits);
      document.getElementById("uniqueVisitors").textContent = formatNumber(totals.uniqueVisitors);
      document.getElementById("totalUsers").textContent = formatNumber(totals.totalUsers);
      document.getElementById("totalOrders").textContent = formatNumber(totals.totalOrders);
      document.getElementById("grossSales").textContent = formatMoney(totals.grossSales);
      document.getElementById("netSales").textContent = formatMoney(totals.netSales);
      document.getElementById("deliveredSales").textContent = formatMoney(totals.deliveredSales);

      const trendTable = document.getElementById("trendTable");
      trendTable.innerHTML = trend.map((row) => `
        <tr class="border-b last:border-b-0">
          <td class="py-2 pr-3 text-gray-800">${row.date}</td>
          <td class="py-2 pr-3 text-gray-700">${formatNumber(row.visits)}</td>
          <td class="py-2 pr-3 text-gray-700">${formatMoney(row.sales)}</td>
        </tr>
      `).join("");
    }

    async function loadDashboard() {
      const token = await verifyAdminAccess();
      if (!token) return;

      try {
        const res = await fetch(`${apiBaseUrl}/api/admin/dashboard`, {
          headers: { Authorization: `Bearer ${token}` }
        });
        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.message || "Failed to load dashboard data");
        }
        renderDashboard(data);
      } catch (err) {
        showAdminNotice(err.message || "Failed to load dashboard data.");
      }
    }

    loadDashboard();
  </script>
</body>
</html>
